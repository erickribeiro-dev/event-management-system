{% extends 'base.html' %}
{% block title %} EMS | Delete event: {{ event.title }} {% endblock title %}

{% block content %}
<div class="flex-column justify-content-center align-items-center d-flex">
    <div class="p-3 border rounded col-12 col-lg-6">
        <h2>Delete event</h2>
        <p>Are you sure you want to delete the event "{{ event.title }}"?</p>
        <p>This action cannot be undone!</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger me-2">Yes, Delete</button>
            <a href="{% url 'events:event_list' %}" class="btn btn-secondary">No, Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
